[pytest]
# "no:anyio" prevents the anyio pytest plugin (pre-installed in CI base image) from
# importing _pytest.scope which doesn't exist in pytest 6.x, causing ModuleNotFoundError.
addopts = -p no:warnings -p no:anyio
markers = 
    auto_create_ns: mark a test to create the Namespace resource for workloads apps before running the test
    skip_when_no_crds: Mark a test to be skipped when CRDs like "BkApp" are not configured
