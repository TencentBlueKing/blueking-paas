  'jsonfield (==3.2.0)',
  'markdown (==3.8.1)',
  'msgpack (==1.0.4)',
  'mypy-extensions (==0.4.3)',
  'pymysql (==1.1.1)',
  'markupsafe (==2.1.5)',
  'oauthlib (==2.1.0)',
  'prometheus-client (==0.9.0)',
