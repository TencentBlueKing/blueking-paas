[tool.poetry]
package-mode = false

[tool.poetry.group.dev.dependencies]
filelock = "*"
mypy = "1.0.0"
pytest = "8.3.0"
pytest-xdist = "3.3.1"
pytest-cov = "*"
pytest-django = "4.11.0"
pytest-mock = "3.2.0"
types-pyyaml = "^5"
types-redis = "^4.1.18"
types-requests = "^2.27.15"
types-bleach = "^4.1.5"
types-pymysql = "^1.0.14"
types-chardet = "^4.0.3"
types-python-dateutil = "^2.8.10"
import-linter = "1.12.0"
requests-mock = "*"

[tool.mypy]
ignore_missing_imports = true
show_error_codes = true
check_untyped_defs = true
namespace_packages = true
exclude = [
  '^paasng/ee/.*$',
  '^paasng/te/.*$',
  '^paasng/paas_settings_ieod/.*$',
  '^paasng/paas_settings_ee/.*$',
  '^paasng/paasng/platform/mgrlegacy/data/.*$',
  '^paasng/tests/paasng/platform/mgrlegacy/.*$',
  '^paasng/paasng/plat_admin/bk_data/management/commands/report_user_app_relationships.py$',
]

[[tool.mypy.overrides]]
module = "mypy-paasng.settings.*"
ignore_errors = true

[[tool.mypy.overrides]]
module = "tests.platform.mgrlegacy.assets.*"
ignore_errors = true

[[tool.mypy.overrides]]
module = "*.migrations.*"
ignore_errors = true
